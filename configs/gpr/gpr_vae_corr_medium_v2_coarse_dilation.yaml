include_configs:
  - gpr_vae_corr_medium.yaml

name: 'gpr/VAE_stage1_corr_medium_v2_coarse_dilation'

# --- Structural confinement fix (PROGRESS.md, 2026-07-14) ---
# The frozen VAE decoder can only keep-or-prune cells already present in the
# coarsest candidate grid it's handed, never invent new ones outside it
# (proven: 0 escaped voxels across 999 corr_medium round-trip test samples).
# Training always hands it an exactly-correct coarse footprint (this VAE
# self-reconstructs GT), so it never practices pruning a wider, uncertain
# candidate region -- exactly what real inference confronts it with, since
# there the coarse footprint comes from encoding Step1's own possibly-
# incomplete prediction instead. Measured cost: up to 48% of poor-tier GT
# structure architecturally unreachable given Step1's coarse footprint.
#
# Fix: dilate the coarsest decode-level candidate grid during training itself
# (kernel_size=7 -> 3-cell margin at the coarse level), applied inside Stage
# 1's own training loop so struct_conv actually learns to prune the added
# false margin while keeping/filling true cells, rather than a frozen decoder
# that never practiced with anything but an exactly-correct footprint). See
# xcube/modules/autoencoding/sunet.py StructPredictionNet.decode().
#
# NOTE (2026-07-15): the dilation mechanism itself was rewritten -- the
# original implementation used GridBatch.conv_grid(kernel_size, stride=1),
# which does NOT grow the active voxel set (verified: identical footprint for
# every kernel size tried). decode() now uses set_from_ijk's pad_min/pad_max
# instead, which genuinely pads a box of neighbors around every active
# coordinate. This also invalidates the "dilation doesn't help" conclusion
# from the two TEUNet-era dilation attempts (Part 1, fix attempts 1-2), which
# used the same broken conv_grid call.
#
# NOTE (2026-07-15): kernel_size raised from 3 to 7 after measuring how much
# of the poor tier's missing structure a given margin can actually reach
# (scripts/test_unreachable_distance.py): margin=1 (kernel=3) only recovers
# ~10% of poor tier's missing structure; margin=3 (kernel=7) recovers ~35%
# (~74% on good tier). A much larger margin=5 (kernel=11) would recover more
# (~54% poor tier) but moves further into the "too much untrusted room"
# territory that collapsed to ~0 IoU in TEUNet fix attempt 4 (Part 1, fully
# open candidate region) -- kernel=7 was chosen as the more conservative step.
#
# NOTE (2026-07-16/17): kernel=7 was tried twice, both with a corrected
# checkpoint-path bug in the eval scripts (see PROGRESS.md) -- once alone
# (version_1) and once with `balance_struct_loss` (version_2, per-batch
# inverse-frequency class weighting on the structure loss, added to counteract
# the ~4x flood of mostly-empty candidate cells the kernel=7 margin
# introduces). BOTH collapsed round-trip IoU from the 0.664 baseline to
# ~0.12-0.13, and "recovery within reachable room" from ~93-96% down to
# ~27-31% -- the network's judgment broke down given that much extra room,
# regardless of loss balancing. The ceiling itself did improve as predicted
# both times (poor-tier unreachable 48.2% -> 26.7%), confirming the mechanism
# works architecturally, but isn't recoverable by the network as trained.
#
# NOTE (2026-07-17): kernel_size dropped back to 3 -- but this time with the
# corrected set_from_ijk-based real dilation (unlike the original `version_0`,
# which used the no-op conv_grid bug and never actually widened anything).
# This is the first genuine test of a SMALL, real widening: only ~1.5-2x more
# candidates rather than kernel=7's ~4x, on the theory that the judgment
# collapse was driven by the size of the jump, not by widening per se. Smaller
# predicted ceiling gain (~10% of poor tier's missing structure recoverable,
# vs. kernel=7's ~35%), but isolated as a single-variable test:
# `balance_struct_loss` left OFF here to avoid conflating two variables in one
# run, since kernel=7 already showed balancing doesn't clearly help either way.
network:
  unet:
    params:
      coarse_dilation_kernel: 3
