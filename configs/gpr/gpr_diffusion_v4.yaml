include_configs:
  - ../train/diffusion/diffusion_128x128x128_sparse.yaml
  - gpr.yaml

name: 'gpr/Diffusion_stage2_v4'

# --- Stage 2 v4 (this config): tests the "network is too small" theory. v1/v2/v3
# all changed *how the model was trained* (footprint, dilation, classifier-free
# dropout) and landed within noise of each other (~0.65-0.66 overall IoU, just
# under TEUNet's own 0.665 baseline). None of those changed the model's actual
# capacity. This config isolates capacity as the only new variable: same plain
# GT footprint as v1, no classifier-free dropout, no attention -- just a bigger
# network (more channels, one more depth level, more res blocks per level).
train_kwargs:
  input_key: "target_grid"
val_kwargs:
  input_key: "target_grid"
test_kwargs:
  input_key: "target_grid"

resolution: "0.005"

vae_config: "/home/ameliacatala/Documents/XCube/configs/gpr/gpr_vae.yaml"
vae_checkpoint: "/home/ameliacatala/Documents/checkpoints/gpr/VAE_stage1/version_4/checkpoints/last.ckpt"

conditioning_key: "concat"
use_cond_grid_concat_cond: true
num_classes: 16

log_image: false

ema: false
scale_by_std: true
use_ddim: true
num_inference_steps: 100

num_train_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02
beta_schedule: "linear"
prediction_type: "epsilon"

supervision:
  mse_weight: 1.0

optimizer: "Adam"
learning_rate:
  init: 5.0e-5
  decay_mult: 1.0
  decay_step: 2000000000
  clip: 1.0e-6
weight_decay: 0.0
grad_clip: 0.5

# --- Increased capacity vs v1/v2/v3: model_channels 32->64, one more depth
# level (channel_mult [1,2]->[1,2,4]), num_res_blocks 1->2. Still no attention,
# to keep this a pure capacity test rather than also changing the conditioning
# mechanism (that's the separate cross-attention experiment, not this one).
network:
  diffuser_name: "UNetModel_Sparse"
  diffuser:
    dims: 3
    image_size: [32, 32, 24]
    model_channels: 64
    use_middle_attention: false
    channel_mult: [1, 2, 4]
    attention_resolutions: []
    num_res_blocks: 2
    num_heads: 4
  scheduler:
    num_train_timesteps: ${num_train_timesteps}
    beta_start: ${beta_start}
    beta_end: ${beta_end}
    beta_schedule: ${beta_schedule}
    variance_type: "fixed_small"
    clip_sample: False
    prediction_type: ${prediction_type}

# batch_size lowered from 2 -- v1-v3's batch_size given a ~4x larger network
# (roughly 2x channels, 1.5x depth, 2x res blocks compounding); if the GPU has
# headroom for batch_size: 2 still, feel free to bump it back up.
batch_size: 1
train_val_num_workers: 4
