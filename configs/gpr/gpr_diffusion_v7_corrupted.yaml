include_configs:
  - ../train/diffusion/diffusion_128x128x128_sparse.yaml
  - gpr.yaml

name: 'gpr/Diffusion_stage2_v7_corrupted'

# --- Stage 2 v7 (this config): tests the "corrupted conditioning" theory.
# v1-v6 all left the conditioning hint (Step1's/TEUNet's grid) untouched
# during training. On most training examples that hint is already close to
# GT, so "just copy the hint" already scores well on average -- the network
# never had a training-time reason to learn real correction behavior. This
# is confirmed by two things: the VAE round-trip test (skipping the entire
# diffusion process scores almost identically to the full trained model),
# and classifier-free dropout (fix attempt 3, randomly removing the hint
# entirely during training) NOT helping either -- that trains "generate from
# nothing," a different skill from "given a wrong hint, fix it."
#
# This config keeps v6's exact architecture, dataset (corr_medium/Step1),
# and material conditioning (all already-established, non-negative changes)
# and adds exactly one new variable: xcube/data/gpr.py's use_corrupted_cond
# randomly drops a fraction of COND_PC's voxels and adds jittered-copy noise
# voxels nearby, on EVERY training example (never on val/test -- gated by
# split=='train' in the dataset code itself, as a safety net beyond only
# setting it in train_kwargs below) -- so blind copy-through can no longer
# be a safe default strategy during training, forcing the network to learn
# actual correction behavior for the first time across all 7 attempts.
train_kwargs:
  input_key: "target_grid"
  use_corrupted_cond: true
  cond_corrupt_drop_prob: 0.15
  cond_corrupt_add_ratio: 0.15
  cond_corrupt_jitter_range: 2
val_kwargs:
  input_key: "target_grid"
test_kwargs:
  input_key: "target_grid"

resolution: "0.005"

# --- Frozen Stage 1 VAE: same corr_medium+material VAE as v6. ---
vae_config: "/home/ameliacatala/Documents/XCube/configs/gpr/gpr_vae_corr_medium.yaml"
vae_checkpoint: "/home/ameliacatala/Documents/checkpoints/gpr/VAE_stage1_corr_medium/version_1/checkpoints/last.ckpt"

# --- Condition on the Step1 prediction's grid via concat (see
# xcube/models/diffusion.py's use_cond_grid_concat_cond branch in
# _forward_cond), plus its material class (use_cond_material). Same as v6. ---
conditioning_key: "concat"
use_cond_grid_concat_cond: true
use_cond_material: true
# num_classes = condition latent's channel count = VAE's own latent channel count,
# since the condition is encoded through that same VAE encoder:
#   f_maps(32) * 2^(num_blocks(2)-1) / cut_ratio(4) = 16
num_classes: 16

log_image: false  # skip the periodic sampling/visualization for now -- not wired up yet

ema: false
scale_by_std: true
use_ddim: true
num_inference_steps: 100

num_train_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02
beta_schedule: "linear"
prediction_type: "epsilon"

supervision:
  mse_weight: 1.0

optimizer: "Adam"
learning_rate:
  init: 5.0e-5
  decay_mult: 1.0
  decay_step: 2000000000  # effectively constant learning rate
  clip: 1.0e-6
weight_decay: 0.0
grad_clip: 0.5

# --- Same architecture as v1/v6: capacity was already ruled out (v4-capacity
# landed below v1-v3's ceiling), so this isolates corrupted conditioning as
# the only new variable on top of v6. ---
network:
  diffuser_name: "UNetModel_Sparse"
  diffuser:
    dims: 3
    image_size: [32, 32, 24]
    model_channels: 32
    use_middle_attention: false
    channel_mult: [1, 2]
    attention_resolutions: []
    num_res_blocks: 1
    num_heads: 4
  scheduler:
    num_train_timesteps: ${num_train_timesteps}
    beta_start: ${beta_start}
    beta_end: ${beta_end}
    beta_schedule: ${beta_schedule}
    variance_type: "fixed_small"
    clip_sample: False
    prediction_type: ${prediction_type}

batch_size: 2
train_val_num_workers: 4
